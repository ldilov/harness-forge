name: Security

on:
  pull_request:
  push:

jobs:
  dependency-and-package-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run validate:package-surface
      - run: npm run validate:catalog
